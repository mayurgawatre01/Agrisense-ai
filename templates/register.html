{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content_auth %}
<div class="auth-page">
    <div class="auth-card" style="max-width:520px;">
        <div class="auth-header">
            <div class="auth-logo">🌱</div>
            <div class="auth-title">Create Account</div>
            <div class="auth-sub">Join CropSense — Smart Farming Starts Here</div>
        </div>

        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Ramesh Kumar" required>
                </div>
                <div class="form-group">
                    <label>Phone (optional)</label>
                    <input type="text" name="phone" placeholder="9876543210">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>State</label>
                    <select name="state" required>
                        <option value="">Select State</option>
                        {% for s in ['Andhra Pradesh','Bihar','Gujarat','Haryana','Karnataka','Kerala','Madhya Pradesh','Maharashtra','Odisha','Punjab','Rajasthan','Tamil Nadu','Telangana','Uttar Pradesh','West Bengal'] %}
                        <option>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>District</label>
                    <input type="text" name="district" placeholder="Your District" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 8 characters" required autocomplete="new-password">
                <div class="form-hint">Use at least 8 characters with a mix of letters and numbers.</div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px; margin-top:0.5rem;">
                <i class="ti ti-user-plus"></i> Create Account
            </button>
        </form>

        <p style="text-align:center; margin-top:1.25rem; color:var(--text-muted); font-size:0.85rem;">
            Already registered? <a href="{{ url_for('auth.login') }}" style="color:var(--green-primary); font-weight:600; text-decoration:none;">Login here →</a>
        </p>
    </div>
</div>
{% endblock %}
