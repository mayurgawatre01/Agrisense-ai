{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content_auth %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">🌾</div>
            <div class="auth-title">Welcome Back</div>
            <div class="auth-sub">Login to your CropSense account</div>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px; font-size:0.9rem; margin-top:0.5rem;">
                <i class="ti ti-login"></i> Login
            </button>
        </form>

        <div style="display:flex; align-items:center; gap:10px; margin:1.25rem 0;">
            <div style="flex:1; height:1px; background:var(--border);"></div>
            <span style="font-size:0.75rem; color:var(--text-muted);">OR</span>
            <div style="flex:1; height:1px; background:var(--border);"></div>
        </div>

        <p style="text-align:center; color:var(--text-muted); font-size:0.85rem;">
            No account? <a href="{{ url_for('auth.register') }}" style="color:var(--green-primary); font-weight:600; text-decoration:none;">Register here →</a>
        </p>
    </div>
</div>
{% endblock %}
